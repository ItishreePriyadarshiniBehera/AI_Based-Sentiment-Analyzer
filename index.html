<!DOCTYPE html>
<html>
<head>
    <title>AI Sentiment Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>AI Sentiment Analyzer</h1>

        <form method="POST">
            <textarea name="text" rows="6" cols="50" placeholder="Enter your text here..."></textarea>
            <br><br>
            <button type="submit">Analyze</button>
        </form>

        {% if result %}
            <h2>Result:</h2>
            <p>{{ result[0]['label'] }}</p>
            <p>Confidence: {{ result[0]['score'] }}</p>
        {% endif %}
    </div>

</body>
</html>
